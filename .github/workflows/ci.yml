name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Start server and run smoke tests
        env:
          DB_PATH: /tmp/ci-test.sqlite
          PORT: 3100
          JWT_SECRET: ci-test-secret
        run: |
          node index.js &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3100/api/profiles?limit=1 > /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done

          echo "=== Legacy list profiles ==="
          curl -sf http://localhost:3100/api/profiles?limit=1 | grep -q '"status":"success"'

          echo "=== v1 profiles requires auth ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/api/v1/profiles)
          [ "$STATUS" = "401" ] || (echo "Expected 401, got $STATUS"; exit 1)

          echo "=== v1 auth/me requires auth ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/api/v1/auth/me)
          [ "$STATUS" = "401" ] || (echo "Expected 401, got $STATUS"; exit 1)

          echo "=== auth/github/authorize missing params ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/api/v1/auth/github/authorize)
          [ "$STATUS" = "400" ] || (echo "Expected 400, got $STATUS"; exit 1)

          echo "=== 404 for unknown route ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/api/unknown)
          [ "$STATUS" = "404" ] || (echo "Expected 404, got $STATUS"; exit 1)

          echo "All smoke tests passed"
          kill $SERVER_PID
